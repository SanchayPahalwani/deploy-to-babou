name: Draft Babou Campaign

# Every merge to main is a "deploy". This drafts a Babou campaign about what
# shipped — agentically when ANTHROPIC_API_KEY is present, deterministically
# otherwise — and never publishes. Add [skip-babou] to a commit to skip.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: draft-babou-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    if: ${{ !contains(github.event.head_commit.message, '[skip-babou]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff against the previous sha

      - name: Draft a Babou campaign from this deploy
        uses: ./
        with:
          babou-api-key: ${{ secrets.BABOU_API_KEY }}
          # Set EITHER secret to enable the agent path. CLAUDE_CODE_OAUTH_TOKEN
          # (from `claude setup-token`) draws on a Claude subscription instead of
          # metered API credits. With neither set, CI runs the deterministic path.
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          product-name: deploy-to-babou
