name: "Draft Babou Campaign"
description: "On deploy, agentically draft a Babou video campaign from the deploy context. Never auto-publishes (no Export)."
branding:
  icon: "film"
  color: "purple"
inputs:
  babou-api-key:
    description: "Babou API key (sk-bab-...). If empty, runs against the bundled local mock MCP server."
    required: false
    default: ""
  anthropic-api-key:
    description: "Anthropic API key for the agent. If empty, falls back to the deterministic REST path."
    required: false
    default: ""
  product-name:
    description: "Product name used in the campaign copy."
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build deploy context
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PRODUCT_NAME: ${{ inputs.product-name }}
      run: npx tsx scripts/build-context.ts

    - name: Draft campaign (agent → Babou MCP)
      if: inputs.anthropic-api-key != ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        BABOU_API_KEY: ${{ inputs.babou-api-key }}
        PRODUCT_NAME: ${{ inputs.product-name }}
      run: |
        npm i -g @anthropic-ai/claude-code
        command -v claude >/dev/null 2>&1 || { echo "::error::Claude Code CLI not on PATH after global install"; exit 1; }
        npx tsx scripts/run-agent.ts

    - name: Draft campaign (deterministic REST/replay)
      if: inputs.anthropic-api-key == ''
      shell: bash
      env:
        BABOU_API_KEY: ${{ inputs.babou-api-key }}
      run: npx tsx scripts/run-rest.ts

    - name: Verify draft invariant (never exported)
      shell: bash
      run: npx tsx scripts/assert-draft.ts

    - name: Write job summary
      shell: bash
      run: npx tsx scripts/summary.ts >> "$GITHUB_STEP_SUMMARY"

    - name: Upload draft artifacts
      uses: actions/upload-artifact@v4
      with:
        name: babou-draft
        path: |
          plan.json
          mock-calls.jsonl
          CONTEXT.md
          agent-output.json
        if-no-files-found: ignore
